{% extends "base.html" %}
{% block content %}
<h1 class="section-title">All Bookings</h1>
<table class="booking-table">
    <tr>
        <th>User</th>
        <th>Course</th>
        <th>Status</th>
    </tr>
    {% for b in bookings %}
    <tr>
        <td>{{ b.user.username }}</td>
        <td>{{ b.course.title }}</td>
        <td>{{ b.status }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
